# ETF expense-ratio manual overrides
#
# Values may be written as decimals (0.0115) or percents (1.15). Both are
# accepted; the loader normalises anything > 15 %-equivalent as percent.
#
# Priority in expense_ratios.py is:
#   1. THIS FILE
#   2. Issuer scrape (YieldMax / ProShares / REX / Roundhill / TRADR)
#   3. yfinance .info['annualReportExpenseRatio']
#
# Use this file when:
#   - yfinance returns a stale or wrong number for a ticker you trust.
#   - The issuer page is JavaScript-rendered and we can't scrape it
#     (GraniteShares, Direxion, Leverage Shares, Defiance as of 2026).
#
# Keep entries sorted alphabetically inside each block to make diffs readable.

