ibkr:
  host: 127.0.0.1
  port: 7496
  client_id: 41
  prefer_delayed: true
  suppress_error_codes: [10089]

accounting:
  use_yfinance: false           # override Flex markPrice with yfinance close
  bucket_split_method: held_exposure  # held_exposure | universe_beta
  # Stable B1/B2 ratio-split (email/dashboard totals): FIFO ledger for spot; B4 pair view unchanged.
  b12_spot_split_method: ledger_fifo       # legacy PnL ledger split when b12_spot_pnl_method=ledger_fifo
  b12_spot_exposure_method: sleeve_balance  # net exposure: sleeve_balance | hedge_ratio | sleeve_offset | ledger_fifo | held_exposure_waterfall
  # Spot PnL sleeve attribution (defaults to b12_spot_exposure_method): long spot → B2/B1 hedge
  # sleeves, structural short spot → B4. ``ledger_fifo`` keeps the lot-timed FIFO trade-tag
  # split (realized by lot-close sleeve, unrealized by current cost basis) instead of smearing
  # cumulative PnL by the *current* sleeve_balance hedge snapshot. Exposure stays sleeve_balance
  # (current risk); PnL uses lot timing so a recently-grown sleeve cannot retroactively claim
  # PnL earned while the spot hedged a different sleeve.
  b12_spot_pnl_method: ledger_fifo
  b12_hedge_delta_floor: 0.25            # min |β| for hr = 1/|β| on B1/B2 ETF legs
  b12_pnl_mode: plan_b4_inject           # lot_timed_strict | plan_b4_inject (uses plan_b4_pnl_mode below)
  plan_b4_pnl_mode: inject_slice    # inject_slice: FIFO realized + plan-split unrealized | full_override (legacy)
  # Do not retroactively inject plan B4 unrealized before live B4 trading began.
  plan_b4_inject_start_date: "2026-05-12"
  # Sleeve-rotation: stale lot tags on closed yieldBOOST sleeves -> live sleeve (NVDA/GOOGL fix).
  spot_sleeve_rotation_retag: true
  spot_sleeve_rotation_tol: 0.05
  spot_sleeve_dead_threshold: 0.05
  # Capacity cap: lot tags overweight live B2 -> cap spot realized at live sleeve; excess -> B1.
  spot_sleeve_capacity_cap: true
  spot_sleeve_capacity_tol: 0.05
  spot_sleeve_capacity_exclude_underlyings:
    - AMD   # lot under-tags B2 vs live sleeve; do not pull realized from B2
  # EOD email: use accounting bucket_pnl as-is (no continuity re-spread). Disable only for
  # one-off methodology transitions where headline jumps must be smoothed vs prior run.
  eod_bucket_pnl_continuity: false
  plan_sleeve_bucketing: sleeve_first  # sleeve_first | delta_first
  # All bucket-2 underlyings (yieldboost / 0<β≤1.5 ETFs) get full Flex replay by default.
  ledger_full_replay_include_bucket2: true
  # Phase 4 restate: replay EVERY underlying from the complete Flex trade history
  # each run instead of seeding from the prior persisted row. This permanently
  # eliminates ledger-vs-IBKR drift carried forward from state booked under the
  # old _is_etf_leg bug (incremental seeding otherwise re-imports stale prior-day
  # rows). Verified non-regressive: published net-exposure/PnL totals are
  # method-driven (sleeve_balance), unchanged $0; runtime ~unchanged (~22s).
  # Current-strategy underlyings reconcile to within a few shares; residual drift
  # is confined to rotated-out / non-strategy holdings (pre-Flex-window lots).
  ledger_full_replay_all: true
  ledger_full_replay_underlyings:
    - MSTR   # extra full replay (also B1 levered)
    - INTC   # levered-only (INTW); rebuild spot ledger without orphan B2 lots
  # Yieldboost names (when override enabled): full spot PnL → B2 if B2 ETF held.
  # Set pnl_override false to attribute spot PnL from FIFO ledger only (trial / strict).
  yieldboost_spot_b2_pnl_override: false
  yieldboost_spot_b2_trade_tag: false
  yieldboost_spot_b2_underlyings:
    - SMCI
    - IONQ
    - IBIT
  plan_aware_b4_attribution: true
  # B4 structural short underlying in pair exposure (plan-implied, not FIFO ledger).
  b4_underlying_exposure_mode: plan_structural   # ledger_fifo | plan_structural
  b4_plan_exposure_underlyings: []               # empty = all B4 registry names with plan b4 sleeve
  b4_plan_exposure_min_usd: 500
  # Canonical B4 underlying attribution rule. ``etf_implied`` (default) sources
  # the structural short underlying leg from held inverse ETFs × β ×
  # ``partial_hedge_ratio`` whenever the latest ``inverse_decay_bucket4`` plan
  # row is missing — so names like BE / CLSK / CRCL that were already entered
  # under the sleeve but no longer appear in proposed_trades.csv still get a
  # negative-signed B4 underlying leg in net_exposure_bucket_4_detail.csv and
  # their spot PnL reflects the short. ``plan_only`` reverts to the legacy
  # "plan-row required" behaviour; ``ledger_fifo`` disables structural shorts
  # entirely and trusts the share ledger only.
  b4_underlying_attribution: etf_implied         # plan_only | etf_implied | ledger_fifo
  b4_attribution_min_usd: 500                    # ignore implied shorts below this magnitude
  b4_partial_hedge_ratio_default: 0.75           # fallback when registry row lacks partial_hedge_ratio
  # Re-seed physical B1/B2 ledger qty from plan ratios (qty_b4 stays 0 on net spot line).
  ledger_plan_seed_b4_underlyings: []
  # Bucket 2: non-flow ETFs with 0 < β ≤ 1.5 (yieldboost, income shorts) + pro-rata spot.
  # Bucket 3: flow-program overlay (inverse β<0 and low-β yieldBOOST shorts, e.g. NVYY/TSYY).
  spot_ratio_consistency_gate: true
  exposure_reconciliation_tol_gross_pct: 0.005
  exposure_reconciliation_tol_net_abs_usd: 10000

strategy:
  tag: ETF_LS
  capital_usd: 825000
  gross_leverage: 4
  blacklist:
    - JPM
    - BRK-B
    - AXP
    - APLD
    - SMR
  # Gross caps after sleeve budgets. With ``per_sleeve``, pair / underlying limits apply **within
  # each sleeve's gross**; root caps are fallbacks for
  # unknown sleeves. Liquidity clips implied book weights using ``liquidity_book_reference``
  # (deployed SUM(gross) vs YAML ``capital_usd × gross_leverage``).
  gross_sizing_caps:
    enabled: true
    max_pair_weight_cap: 0.10
    max_underlying_weight_cap: 0.15
    aum_use_pct: 0.5
    short_avail_use_pct: 1.00
    missing_shares_cap: 0.15
    shares_outstanding_use_frac: 0.35
    median_daily_volume_use_pct: 0.3
    # Liquidity ladders (``ref_short = T × short_leg_frac``): match placed book scale vs YAML target gross.
    liquidity_book_reference: deployed_book   # deployed_book | target_book
    # After caps+covariance, rescale each sleeve toward its YAML budget then re-run caps once.
    # ``absolute_budget`` (default): each sleeve sum := YAML ``budget_sleeve_usd`` (then caps clip).
    # ``fraction_of_deployed``: legacy — each sleeve sum := budget_s/target_gross_usd × current total.
    rebalance_sleeve_weights_to_budget: true
    rebalance_sleeve_target_mode: absolute_budget
    # Pre-cap **score haircut**: limit how much an under-scored row (low decay/edge × borrow penalty)
    # can grow when the simplex projector redistributes mass from over-cap names. Cap_v[i] is clipped
    # to ``min(pair_cap, ha × v[i])`` where v[i] is sleeve-internal pre-cap weight from
    # ``_decay_score_weights``. ha=2.0 ⇒ row may grow at most 2× its score weight; ha=1.0 ⇒ no growth;
    # ``0`` (or unset) disables (legacy headroom-only redistribution). Applies per sleeve via
    # ``per_sleeve.<sleeve>.pre_cap_score_haircut_multiplier`` (overrides the root default).
    pre_cap_score_haircut_multiplier: 0.0
    # Stability #2: per-pair weight hysteresis (production only — defaults disable it).
    weight_hysteresis_abs: 0.0       # snap to prior gross when |delta| <= abs * sum(gross), e.g. 0.005
    weight_hysteresis_rel: 0.0       # OR |delta| <= rel * prev, e.g. 0.10
    per_sleeve:
      core_leveraged:
        max_pair_weight: 0.10
        max_underlying_weight: 0.2
      yieldboost:
        max_pair_weight: 0.20
        max_underlying_weight: 0.2
        # Block low-score (high-borrow) YB names from being lifted to ``max_pair_weight`` by the
        # cap projector's headroom redistribution. 2.0 ⇒ row can grow at most 2× its decay-score share.
        pre_cap_score_haircut_multiplier: 1
      inverse_decay_bucket4:
        max_pair_weight: 0.20
        max_underlying_weight: 0.30
        pre_cap_score_haircut_multiplier: 1
  # One-shot covariance penalty on final post-cap gross_target_usd; tilts mass away from
  # underlyings with high marginal contribution to portfolio variance (within sleeve when
  # ``per_sleeve_scopes`` set), then re-applies gross_sizing_caps so pair /
  # underlying / liquidity ceilings still bind.
  covariance_balance:
    enabled: true
    lookback_days: 252
    min_obs: 60
    shrink: 0.5
    penalty_strength: .5
    max_relative_shift: 0.5
    # Run covariance_balance separately per sleeve (Bucket 1 core, Bucket 2 YieldBoost, Bucket 4 inverse).
    # Omit or leave empty → legacy: one pass across the combined book.
    per_sleeve_scopes:
      - core_leveraged
      - yieldboost
      - inverse_decay_bucket4

paths:
  screened_csv: data/etf_screened_today.csv
  blacklist_txt: config/strategy_blacklist.txt
  baseline_csv: data/baseline_snapshot.csv
  proposed_trades_csv: data/proposed_trades.csv
  flow_ledger_csv: data/flow_ledger.csv
  etf_shares_outstanding_csv: ../etf-dashboard/data/etf_shares_outstanding.csv
  # Liquidity squeeze panel falls back to these when the legacy CSV is absent:
  etf_metrics_daily_csv: ../etf-dashboard/data/etf_metrics_daily.csv
  etf_metrics_latest_json: ../etf-dashboard/data/etf_metrics_latest.json
  # Optional CSV (date index, columns = underlying tickers) of daily prices OR log returns
  # consumed by strategy.covariance_balance. Missing file → covariance_balance silently no-ops.
  underlying_returns_csv: data/underlying_returns.csv
  # Sticky core (bucket-1) net-decay gate; updated each generate_trade_plan run when hysteresis is on
  core_leveraged_decay_state_json: data/core_leveraged_decay_state.json
  # Operator-managed corporate-action splits override CSV. Schema:
  #   symbol,ex_date,numerator,denominator,source,note
  # 1-for-10 reverse split:  symbol=BAIG,ex_date=2026-05-05,numerator=1,denominator=10
  # 5-for-1 forward split:   symbol=NVDA,ex_date=2024-06-10,numerator=5,denominator=1
  # Missing file is fine — sources will rely on Yahoo events / Flex CA / heuristic.
  splits_overrides_csv: data/splits_overrides.csv
  # Auto-populated by ibkr_accounting from Flex <CorporateAction type="RS"> rows.
  flex_splits_csv: data/splits_from_flex.csv

execution:
  parallel_n: 25
  # Per-phase ceilings on concurrent IB worker connections. Each phase
  # spawns ``min(parallel_n, trades_in_phase, <phase>_max_workers,
  # MAX_TWS_CLIENTS)`` workers, so a single-trade phase opens exactly one
  # connection rather than the full ``parallel_n`` pool.
  cleanup_max_workers: 25
  establish_max_workers: 25
  hedge_max_workers: 25
  # Pacing: ``worker_connect_stagger_sec`` spaces out IB connection setup
  # in ``_make_worker_pool`` (cleanup); ``worker_submit_stagger_sec`` spaces
  # out *order submission* in establish/hedge pools so 25 orders don't all
  # hit TWS in the same tick.
  worker_connect_stagger_sec: 0.25
  worker_submit_stagger_sec: 1.0
  auto_approve: true
  # ``execute_trade_plan.execute_leg`` only honors ``ADAPTIVE_MKT``; other styles
  # fall through to the limit-order path with ``limit_bps`` offset.
  order_style: ADAPTIVE_MKT
  dry_run: false                       # ``DRY_RUN=1`` env var overrides this in execute_trade_plan.py
  limit_bps: 25.0
  short_first: true
  max_retries: 3
  timeout_sec: 90
  market_accept_timeout_sec: 90        # accept-timeout for ADAPTIVE_MKT legs
  market_done_timeout_sec: 120         # terminal-state timeout for ADAPTIVE_MKT legs

screener:
  # Authoritative net-edge soft-purgatory band (read by ``recompute_purgatory_by_bucket``).
  # With borrow OK, ``net_edge_p50_annual`` must exceed this to avoid purgatory.
  purgatory_net_edge_max_annual: 0.05
  # No-locate purgatory: keep-open semantics (no new entry) for ETFs that the
  # daily IBKR FTP feed says we cannot short. ``exclude_no_shares`` fires when
  # ``shares_available < min_shares_available`` (default 10 sh; set explicitly below);
  # ``borrow_missing_from_ftp`` fires when the symbol was absent from the FTP
  # feed at screener pull time. Either is sufficient — both default ON.
  # Toggling either to false reverts to legacy behaviour for that signal only.
  no_locate_purgatory:
    exclude_no_shares: true
    borrow_missing_from_ftp: true
  # Minimum IBKR FTP ``shares_available`` to treat as shortable (``exclude_no_shares``).
  min_shares_available: 10
  # Per-bucket borrow bands — the SINGLE source of truth for new-entry borrow caps
  # and purgatory keep bands used by ``daily_screener`` and ``generate_trade_plan``.
  #
  # Per row (after bucket assignment), ``recompute_purgatory_by_bucket`` flags
  # the row as purgatory when:
  #   entry_borrow_cap < borrow_current <= keep_borrow_cap
  per_bucket:
    bucket_1:
      entry_borrow_cap: 0.60      # new B1 exposure when borrow cost <= this
      keep_borrow_cap: 0.75       # keep-open purgatory band ends above this borrow cost
    bucket_2:
      entry_borrow_cap: 0.35
      keep_borrow_cap: 0.50
    bucket_4:
      entry_borrow_cap: 0.95
      keep_borrow_cap: 1.20
  min_delta_days: 30
  max_stale_days: 5             # drop ETFs with no trade in last N calendar days (delisted/liquidated)
  # Vol-ratio data-quality gate. ``vol_ratio_value = vol_etf / (|β| · vol_und)``;
  # an ETF with Beta=2 should sit near 1.0. Outliers (e.g. unhandled reverse
  # splits inflating vol_etf) flip ``vol_ratio_outlier=True`` and are forced
  # into purgatory until resolved. Missing keys → safe defaults (0.5..1.5).
  vol_ratio_gate:
    enabled: true
    diagnostic_min: 0.20         # console warn-band lower bound (looser)
    diagnostic_max: 1.75         # console warn-band upper bound (looser)
    purgatory_on_outlier: true   # force purgatory on outliers
    by_abs_beta:
      "1.0": {min: 0.5, max: 1.5}
      "2.0": {min: 0.5, max: 1.5}
      "3.0": {min: 0.5, max: 1.5}
    default: {min: 0.5, max: 1.5}

portfolio:
  # Rebalance thresholds used by rebalance_strategy.py and harvest_underexposed_shorts.py.
  rebalance:
    min_trade_usd: 250            # skip deltas below $250
    # Phase 2b target_basis selects which target columns drive the resize band.
    # - hybrid (default): band uses ``optimal_long_usd / optimal_short_usd`` as the
    #   structural anchor (so we don't trim positions when today's IBKR shares_available
    #   squeezes executable down), but each day's submitted order qty is clipped to the
    #   executable target (``long_usd / short_usd``) so we never ask for shares that aren't
    #   available today.
    # - executable: legacy behavior; band and orders both read executable columns.
    # - optimal: band and orders both read optimal columns. Pair with FTP cap in the executor.
    target_basis: "hybrid"
    # Phase 3 hedge rule: compare delta-adjusted net exposure to gross exposure.
    # Trigger is when to act; target is where to stop after acting.
    hedge:
      too_long:
        trigger_net_pct: 0.04     # trigger when net long > 4% of gross
        target_net_pct: 0.01      # hedge back to +1%, not fully flat
      too_short:
        trigger_net_pct: 0.01     # trigger when net short > 1% of gross
        target_net_pct: 0.00      # hedge back to flat
    establish_threshold_usd: 1000.0  # rebalance_strategy: skip Phase 2 if position already > $100

    # Phase 2b — Resize Existing Pairs (rebalance_strategy.py).
    # Bidirectional leg-by-leg trim/grow toward plan USD targets, gated
    # by a hysteresis band. Inserted between Phase 2 (Establish) and
    # Phase 3 (Hedge). See phase2b_resize.py for decision logic.
    #
    # Effective threshold per leg:
    #   enter_thr = max(enter_band_pct * |target_usd|, min_trim_usd|min_grow_usd)
    #   exit_thr  = max(exit_band_pct  * |target_usd|, min_trim_usd|min_grow_usd)
    # A leg trades only when |abs_drift| > enter_thr, and is rebalanced
    # to within exit_thr of target. The absolute floor protects small
    # B4 pairs where percentage bands fall below transaction costs.
    resize:
      enabled: true
      enter_band_pct: 0.12        # trigger when leg notional drifts >12% from target
      exit_band_pct: 0.04         # trim/grow until within 4% (hysteresis)
      min_trim_usd: 250           # absolute floor for SELL/BTC trades
      min_grow_usd: 250          # absolute floor for BUY/grow-short trades

    # Phase 2b — Stage 2 tax routing (tax_router.py).
    # When enabled, TRIM trades (SELL on long leg, BUY-to-cover on short leg)
    # are routed through a tax-aware classifier:
    #   - GAIN + prefer_long_term_lots:  limit qty to long-term lots only
    #   - LOSS >= min_loss_usd_to_substitute: route through substitution
    #   - LOSS < floor:                       pass through with the loss booked
    #   - LOSS with no substitute available:  defer (skip) the trim
    #
    # IBKR API does not support per-order SpecID lot designation. This
    # routing only PREDICTS realized P&L under the assumed account default
    # lot method (lot_method_assumed) -- the broker still matches lots per
    # the TWS Account Configuration -> Tax Optimizer Default Match Method
    # (set to HIFO or MaxLossUtilization once, manually). Lot data comes
    # from Flex's OpenPositions section configured at levelOfDetail=LOT.
    # See README "Stage 2 setup" section for one-time TWS configuration.
    #
    # DISABLED BY DEFAULT — flip to true after lot data is flowing and
    # active_substitutions.json is initialized.
    tax:
      enabled: false
      lot_method_assumed: "HIFO"  # must match TWS Tax Optimizer default
      prefer_long_term_lots: true
      st_lt_holding_days: 365

  # Phase 2b — Stage 2 substitution engine (substitution_engine.py).
  # Configurable substitute pool per underlying for tax-loss harvesting.
  # When a TRIM would realize a loss above the floor, the engine returns
  # the first eligible substitute from the ordered list (skipping any
  # already in-use as a substitute for another original).
  #
  # The "substantially identical" determination is the user's call;
  # the engine treats the configured pool as authoritative.
  #
  # State persisted to data/active_substitutions.json. By default the
  # substitute is held indefinitely (no swap-back). Set hold_substitute_days
  # to 0 to disable scheduled swap-back entirely; positive values record an
  # advisory swap_back_due date for future Stage 3 logic.
  substitution:
    enabled: false
    min_loss_usd_to_substitute: 500.0
    hold_substitute_days: 31
    max_substitute_borrow_annual: 1.0
    underlyings: {}              # long-leg pool, e.g. IBIT: ["FBTC","BITB","ARKB"]
    letfs: {}                    # short-leg LETF pool, used when a short_etf trim
                                 # would realize a loss and a substitute is configured.
                                 # e.g. SQQQ: ["SQQB","PSQ"]

  # Shared weighting defaults — overridden per-sleeve below.
  # NOTE: the YAML anchor is consumed at parse time via ``<<: *weighting_defaults``
  # in each sleeve. Python never reads ``portfolio._weighting_defaults`` directly.
  # ``realized_trust_days`` is intentionally NOT in the anchor — only
  # ``daily_screener.add_decay_columns`` reads it, and only from
  # ``core_leveraged.weighting``, so it lives there explicitly to avoid the
  # impression that yieldboost / B4 sleeves can override it.
  _weighting_defaults: &weighting_defaults
    method: "decay_score"             # "equal" or "decay_score"
    # Sizing score: use net-edge p50 from screener (``net_edge_p50_annual``). ``sizing_signal: net_edge`` selects
    # the edge path; ``sizing_edge_column`` pins the column (B4 may override in its sleeve block if needed).
    # raw_score = signal - borrow_aversion * borrow_current (keep borrow_aversion small when signal is already net).
    sizing_signal: "net_edge"
    sizing_edge_column: "net_edge_p50_annual"
    margin_efficiency_power: 0.75     # favour 2x over 3x: score x (1/|B|)^0.5
    # --- Iteration knobs (defaults are no-ops; flip per sleeve to test) -----
    score_concavity_p: 2           # Candidate A: <1 flattens the top tail (try 0.85 / 0.90)

  sleeves:
    core_leveraged:
      # Share of gross after inverse_decay_bucket4, split vs ``yieldboost`` (normalized together).
      target_weight: 0.48
      rules:
        min_delta_used: 1.50
        # Core = accounting bucket-1 style levered longs. Optional net-decay floor (annual fraction).
        # If min_net_decay_annual > 0: ALWAYS enforced (hard cap) even when hysteresis is ON — no bypass.
        # With hysteresis OFF: require net_decay_annual >= min_net_decay_annual when min > 0.
        # With hysteresis ON: persist per-ETF sticky flag in core_leveraged_decay_state_json — enter
        # only when decay >= enter_above; once in, stay until decay < exit_below (enter_above > exit_below).
        min_net_decay_annual: 0.06
        net_decay_hysteresis:
          enabled: true
          enter_above: 0.12
          exit_below: 0.08
      weighting:
        <<: *weighting_defaults
        # ``realized_trust_days`` is read only here (daily_screener.add_decay_columns
        # ~3468). Defaults to 252 if absent. Other sleeves don't read it.
        realized_trust_days: 252
        max_name_weight: 0.10         # align with per-sleeve pair cap
        eq_blend: 0.0                 # v16 selected: pure score weight
        borrow_aversion: 0.25         # v16 selected B1 borrow aversion
        score_concavity_p: 2.0        # v16 selected B1 score shape

    yieldboost:
      enabled: true
      # Bucket-2 sleeve: screened rows with ``is_yieldboost`` only (see daily_screener). Split vs core
      # is relative — core.target_weight + yieldboost.target_weight is normalized after B4.
      target_weight: 0.5
      rules:
        min_net_edge_annual: 0.25     # gate on ``net_edge_p50_annual`` for YieldBoost names
      weighting:
        <<: *weighting_defaults
        max_name_weight: 0.20
        eq_blend: 0.02
        borrow_aversion: 0.6
        score_concavity_p: 1

    inverse_decay_bucket4:
      enabled: true                  # sleeve split vs stock: inverse_decay_bucket4.target_weight remainder → stock
      target_weight: 0.02
      # B4 universe = every inverse (β<0, ``inverse_shortable``) ticker in the screener,
      # MINUS ``rules.excluded_etfs`` (per-name overrides like KOLD)
      # MINUS ``flow_program.universe.shorts`` (those are sized in the weekly flow sleeve).
      rules:
        partial_hedge_ratio: 0.75      # 1.0 = fully hedge inverse beta exposure
        # ------------------------------------------------------------------
        # Bucket 4 dynamic hedge + cadence engine (scripts/bucket4_hedge_cadence.py)
        # Disabled by default -> sizing falls back to decay_score weighting and the
        # legacy v6 hedge panel. Flip ``enabled: true`` to roll out (gradual ramp:
        # raise target_weight / max_name_weight as comfort grows).
        # ------------------------------------------------------------------
        bucket4_weekly_opt2:
          enabled: false
          history_start: "2018-01-01"
          weekly_rebalance_freq: "W-FRI"   # used only when hedge_cadence_policy.source = v6_panel
          warmup_bdays: 65
          fee_bps: 1.0
          slippage_bps: 20.0               # realistic IBKR fill assumption from the A7 backtest
          borrow_multiplier: 1.0
          pf_min_pairs: 5
          # Hedge ratio (h) + rebalance cadence (days) engine. Every output is
          # reverse-engineerable from the printed inputs (TR, VCR, VCR_med).
          hedge_cadence_policy:
            source: tr_vcr                 # tr_vcr cadence + hedge | v6_panel (weekly v6 for both)
            hedge_ratio_model: v6          # v6 = Opt-2 panel (default) | v7 = VCR closed form
            opt2_k: 0.05                   # v6: h_star = h_base - opt2_k * z_composite
            # --- v7 hedge only (when hedge_ratio_model: v7): h = clip(h_mid + k_vcr*(VCR-VCR_med), ...)
            h_mid: 0.55
            k_vcr: 1.0
            h_min: 0.30
            h_max: 0.80
            alpha: 0.25                     # EMA on v7 daily h series (0 = off)
            # --- cadence: days = clip(round(base_days / (1 + k_tr*(TR-1) + m_vcr*(VCR-VCR_med))), min, max)
            base_days: 10.0                 # risk-aware default (sweep: ~median CAGR of 21d, lower vol)
            k_tr: 2.25
            m_vcr: 2.5                      # mean-best A7 cadence sensitivity (39.4% CAGR @ 20bps)
            min_interval: 1
            max_interval: 21                # allow calm regimes to stretch toward 3-week spacing
            operator_check_days: 5          # run rebalance_strategy.py every N business days; per-pair due gate inside
            cadence_state_json: data/b4_cadence_state.json
            force_on_max_interval: true     # always rebalance a pair once max_interval trading days elapsed
            # Discretionary per-name overrides (the ONLY sanctioned hand-tune). Bounded
            # by h_min/h_max and min/max_interval regardless of values here.
            name_tilt: {}
            #   UVIX: { h_mult: 0.9, interval_mult: 1.0, note: "vol ETP tail-cap" }
        # Grow-only ratchet: inverse-ETF short leg is floored at max(solved, held,
        # persisted_floor); delta reduction flows through the underlying leg only.
        ratchet:
          enabled: false
          state_json: data/b4_inverse_ratchet_state.json
          reconcile_tolerance_usd: 250.0
        # Sleeve-level drawdown governor: pause inverse adds + bias underlying hedge
        # toward h_max on worst-DD pairs when trailing DD breaches thresholds.
        drawdown_governor:
          enabled: false
          dd_freeze: 0.12                  # trailing DD that freezes new inverse adds
          dd_derisk: 0.18                  # trailing DD that biases underlying hedge to h_max
          dd_hedge_bump: 0.10              # additive bump toward h_max when derisking
          state_json: data/b4_governor_state.json
        min_net_edge_annual: 0.35      # require bucket4_net_edge_annual >= this
        min_underlying_vol: 0.4      # universe entry: annual vol floor (aligned with DCQ bucket_4)
        excluded_etfs:                # never allocate inverse_decay_bucket4 to these tickers
          - KOLD
          - SCO
        max_shares_outstanding_frac: 0.3
        # Volatility ETPs (UVIX/SVIX, etc.) often have β≥0 so they miss ``negative_beta`` B4.
        # Optional slice: same B4 gates except β<0; capped at ``share_of_b4_budget`` of total B4 dollars.
        volatility_etp_bucket4:
          enabled: true
          share_of_b4_budget: 0.01    # 1% of total inverse_decay_bucket4 gross when vol rows exist
      weighting:
        <<: *weighting_defaults
        max_name_weight: 0.15
        eq_blend: 0.05
        borrow_aversion: .6
    flow_program:
      rules:
        hard_borrow_cap: 0.30        # weekly flow adds only when borrow <= 30% and net_edge_p50 > 0
      frequency: "W"
      deployment_base: "fixed_usd_per_week"
      fixed_usd_per_week: 1300
      schedule_days: [0, 3]            # Monday=0, Thursday=3 (Python weekday)
      schedule_time_et: "10:00:00"     # US/Eastern activation time
      universe:
        shorts:
          - SDS
          - EWV
          - SQQQ
          - TQQY
          - LABD
          - SOXS
          - FAZ
          - DUST
          - ZSL
          - TSLQ
          - TSYY
          - NVDQ
          - NVYY
          - AMZO
          - AZYY
          - ETHD
          - PLTZ
          - PLYY
      weighting:
        method: "fixed"
        normalize: true
        weights:
          SDS: 0.2317
          EWV: 0.1871
          SQQQ: 0.1558
          TQQY: 0.0610
          LABD: 0.0779
          SOXS: 0.0482
          FAZ: 0.0787
          DUST: 0.0245
          ZSL: 0.0079
          TSLQ: 0.0267
          TSYY: 0.0145
          NVDQ: 0.0267
          NVYY: 0.0212
          AMZO: 0.0207
          AZYY: 0.0072
          ETHD: 0.0034
          PLTZ: 0.0034
          PLYY: 0.0034

# SPX slide-risk: horizon shock scaling, stress β, historical paths (risk_dashboard).
spx_shock:
  horizon_shock_mode: rms          # terminal | rms | drift
  show_terminal_12m_row: true
  path_scenarios_enabled: true
  stress_beta:
    enabled: true
    down_delta: 0.15
    down_threshold_pct: -0.05
    use_variance_decomp_cap: true
    decomp_cap_factor: 1.0

