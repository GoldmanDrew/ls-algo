ibkr:
  host: 127.0.0.1
  port: 7496
  client_id: 41
  prefer_delayed: true
  suppress_error_codes: [10089]

accounting:
  use_yfinance: false           # override Flex markPrice with yfinance close
  bucket_split_method: held_exposure  # held_exposure | universe_beta

strategy:
  tag: ETF_LS
  capital_usd: 625000          # fallback if equity_source=static
  gross_leverage: 4
  equity_source: "ibkr"      # "ibkr" | "static" | "file"
  blacklist:
    - JPM
    - BRK-B
    - AXP
    - APLD
  beta_cutoff: 1.55
  # Book-level gross caps after sleeve budgets (aligned with backtest CFG / joint book limits).
  # Preserves total allocated gross while enforcing per-pair, per-underlying, and liquidity ceilings.
  gross_sizing_caps:
    enabled: true
    max_pair_weight_cap: 0.05
    max_underlying_weight_cap: 0.11
    aum_use_pct: 0.02
    short_avail_use_pct: 0.25
    missing_shares_cap: 0.02
    shares_outstanding_use_frac: 0.20
    median_daily_volume_use_pct: 0.10
  # One-shot covariance penalty on final post-cap gross_target_usd; tilts mass away from
  # underlyings with high marginal contribution to portfolio variance, then re-applies the
  # same gross_sizing_caps so pair / underlying / liquidity ceilings still bind.
  covariance_balance:
    enabled: false
    lookback_days: 252
    min_obs: 60
    shrink: 0.35
    penalty_strength: 0.85
    max_relative_shift: 0.50

paths:
  screened_csv: data/etf_screened_today.csv
  blacklist_txt: config/strategy_blacklist.txt
  baseline_csv: data/baseline_snapshot.csv
  proposed_trades_csv: data/proposed_trades.csv
  ledger_csv: data/strategy_ledger.csv
  fills_csv: data/trade_fills.csv
  equity_snapshot_csv: data/equity_snapshot.csv
  flow_ledger_csv: data/flow_ledger.csv
  etf_shares_outstanding_csv: ../etf-dashboard/data/etf_shares_outstanding.csv
  # Optional CSV (date index, columns = underlying tickers) of daily prices OR log returns
  # consumed by strategy.covariance_balance. Missing file → covariance_balance silently no-ops.
  underlying_returns_csv: data/underlying_returns.csv
  # Sticky core (bucket-1) net-decay gate; updated each generate_trade_plan run when hysteresis is on
  core_leveraged_decay_state_json: data/core_leveraged_decay_state.json
  # Operator-managed corporate-action splits override CSV. Schema:
  #   symbol,ex_date,numerator,denominator,source,note
  # 1-for-10 reverse split:  symbol=BAIG,ex_date=2026-05-05,numerator=1,denominator=10
  # 5-for-1 forward split:   symbol=NVDA,ex_date=2024-06-10,numerator=5,denominator=1
  # Missing file is fine — sources will rely on Yahoo events / Flex CA / heuristic.
  splits_overrides_csv: data/splits_overrides.csv
  # Auto-populated by ibkr_accounting from Flex <CorporateAction type="RS"> rows.
  flex_splits_csv: data/splits_from_flex.csv

execution:
  parallel_n: 25
  auto_approve: true
  order_style: ADAPTIVE_MKT
  dry_run: false
  limit_bps: 25.0
  aggressive_bps_step: 50.0
  market_fallback_third_try: true
  short_first: true
  max_retries: 3
  timeout_sec: 90
  accept_timeout_sec: 20
  market_accept_timeout_sec: 90
  limit_done_timeout_sec: 90
  market_done_timeout_sec: 180
  cancel_client_id: 99         # dedicated client for cancel coordinator

screener:
  # Global fallbacks for ``screen_universe`` (diagnostics). Authoritative purgatory is
  # recomputed per row in ``daily_screener.recompute_purgatory_by_bucket`` using ``per_bucket``.
  borrow_low: 0.55
  purgatory_margin: 0.25
  hard_borrow_cap: 0.75           # above = not purgatory; core sizing treats as exit band vs soft cap
  whitelist_hard_borrow_cap: 0.55 # whitelist-only protected names above this => protected_bad
  flow_hard_borrow_cap: 0.40     # flow-program shorts: adds only when borrow <= this (see generate_trade_plan)
  # With borrow OK, net_edge_p50 must exceed this to avoid purgatory (inclusive soft band (0, max]).
  purgatory_net_edge_max_annual: 0.05
  per_bucket:
    bucket_1:
      borrow_low: 0.55            # new exposure when borrow cost <= this
      purgatory_margin: 0.25      # hold band through min(low+margin, hard)
      hard_borrow_cap: 0.75       # force-exit / no new adds above this borrow cost
    bucket_2:
      borrow_low: 0.20
      purgatory_margin: 0.15
      hard_borrow_cap: 0.35
    bucket_4:
      borrow_low: 1.00
      purgatory_margin: 0.20
      hard_borrow_cap: 1.20
  min_beta_days: 5
  max_stale_days: 5             # drop ETFs with no trade in last N calendar days (delisted/liquidated)
  # Vol-ratio data-quality gate. ``vol_ratio_value = vol_etf / (|β| · vol_und)``;
  # an ETF with Beta=2 should sit near 1.0. Outliers (e.g. unhandled reverse
  # splits inflating vol_etf) flip ``vol_ratio_outlier=True`` and are forced
  # into purgatory until resolved. Missing keys → safe defaults (0.5..1.5).
  vol_ratio_gate:
    enabled: true
    diagnostic_min: 0.20         # console warn-band lower bound (looser)
    diagnostic_max: 1.75         # console warn-band upper bound (looser)
    purgatory_on_outlier: true   # force purgatory on outliers
    by_abs_beta:
      "1.0": {min: 0.5, max: 1.5}
      "2.0": {min: 0.5, max: 1.5}
      "3.0": {min: 0.5, max: 1.5}
    default: {min: 0.5, max: 1.5}

portfolio:
  # Rebalance thresholds — skip small trades to reduce costs
  rebalance:
    drift_trigger_pct: 0.02       # rebalance if name drifts >2% from target (execute_trade_plan)
    min_trade_usd: 200            # skip deltas below $200
    min_days_between: 1
    net_trigger_long_pct: 0.02    # trigger when net long > 2% of gross
    net_trigger_short_pct: 0.01   # trigger when net short > 1% of gross
    net_target_long_pct: 0.01     # correct net-long to 1% (50% hedge-back)
    net_target_short_pct: 0.00    # correct net-short to 0% (full flat)
    establish_threshold_usd: 100.0  # rebalance_strategy: skip Phase 2 if position already > $100

  # Shared weighting defaults — overridden per-sleeve below
  _weighting_defaults: &weighting_defaults
    method: "decay_score"             # "equal" or "decay_score"
    # Sizing score: "blended_decay" (blended_gross_decay) or "net_edge" (net_edge_p50_annual; B4: bucket4_net_edge_annual).
    # Same borrow term as decay: raw = signal - borrow_aversion * borrow_current.
    sizing_signal: "net_edge"
    sizing_edge_column: null          # optional override; null = sleeve default column
    realized_trust_days: 252          # full trust after 1yr of OLS data
    borrow_blend_current: 0.5        # weight on current vs historical borrow
    maturity_full_days: 252           # linear ramp: ETF needs 1yr history for full weight
    margin_efficiency_power: 0.5     # favour 2x over 3x: score x (1/|B|)^0.5

  sleeves:
    core_leveraged:
      allocation_type: "stock"
      target_weight: 0.675
      rules:
        min_beta_used: 1.50
        # Core = accounting bucket-1 style levered longs. Optional net-decay floor (annual fraction).
        # If min_net_decay_annual > 0: ALWAYS enforced (hard cap) even when hysteresis is ON — no bypass.
        # With hysteresis OFF: require net_decay_annual >= min_net_decay_annual (still never < 0).
        # With hysteresis ON: persist per-ETF sticky flag in core_leveraged_decay_state_json — enter
        # only when decay >= enter_above; once in, stay until decay < exit_below (enter_above > exit_below).
        min_net_decay_annual: 0.0
        net_decay_hysteresis:
          enabled: true
          enter_above: 0.12
          exit_below: 0.08
      weighting:
        <<: *weighting_defaults
        max_name_weight: 0.15         # 12% cap per underlying
        eq_blend: 0.15                # 25% equal-weight + 50% decay-score
        borrow_aversion: 3

    whitelist_stock:
      allocation_type: "stock"
      target_weight: 0.20
      universe:
        etfs:
          - MTYY
          - HMYY
          - MAAY
          - FBYY
          - XBTY
          - QBY
          - IOYY
          - COYY
          - CWY
          - MUYY
          - GMEY
          - DRAY
          - RDYY
          - SMYY
          - AIYY
          # Backtest / research: keep these names active despite borrow band or zero-locate snapshot
          - CORD
          - ASTN
          - UVIX
      weighting:
        <<: *weighting_defaults
        max_name_weight: 0.3         # 30% cap per underlying
        eq_blend: 0.05                # 5% equal-weight + 95% decay-score
        borrow_aversion: 3.3

    inverse_decay_bucket4:
      allocation_type: "stock"
      enabled: false                 # false = no Bucket 4 rows in proposed trades; core/wl use full gross budget
      target_weight: 0.125
      rules:
        partial_hedge_ratio: 1.0      # 1.0 = fully hedge inverse beta exposure
        min_net_edge_annual: 0.0      # require bucket4_net_edge_annual >= this
        min_underlying_vol: 0.50      # universe entry: require vol_underlying_annual >= 50%
        bucket4_borrow_cap: 1.20      # B4: max annual borrow (decimal) for inverse sleeve
        hard_borrow_cap: 1.20         # legacy alias (kept for compatibility)
        excluded_etfs:                # never allocate inverse_decay_bucket4 to these tickers
          - KOLD
        max_shares_outstanding_frac: 0.2
      weighting:
        <<: *weighting_defaults
        method: "decay_score"
        max_name_weight: 0.2
        eq_blend: 0.1
        borrow_aversion: 3.0
    flow_program:
      allocation_type: "flow"
      rules:
        hard_borrow_cap: 0.40        # weekly flow adds only when borrow <= 40% and net_edge_p50 > 0
      frequency: "W"
      deployment_base: "fixed_usd_per_week"
      fixed_usd_per_week: 1300
      schedule_days: [0, 3]            # Monday=0, Thursday=3 (Python weekday)
      schedule_time_et: "10:00:00"     # US/Eastern activation time
      universe:
        shorts:
          - SDS
          - EWV
          - SQQQ
          - TQQY
          - LABD
          - SOXS
          - FAZ
          - DUST
          - ZSL
          - TSLQ
          - TSYY
          - NVDQ
          - NVYY
          - AMZO
          - AZYY
          - ETHD
          - PLTZ
          - PLYY
      weighting:
        method: "fixed"
        normalize: true
        weights:
          SDS: 0.2317
          EWV: 0.1871
          SQQQ: 0.1558
          TQQY: 0.0610
          LABD: 0.0779
          SOXS: 0.0482
          FAZ: 0.0787
          DUST: 0.0245
          ZSL: 0.0079
          TSLQ: 0.0267
          TSYY: 0.0145
          NVDQ: 0.0267
          NVYY: 0.0212
          AMZO: 0.0207
          AZYY: 0.0072
          ETHD: 0.0034
          PLTZ: 0.0034
          PLYY: 0.0034

