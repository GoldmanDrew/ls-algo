# Operator pair-level tilts — Bucket 4 (inverse_decay_bucket4) and Bucket 5
# (volatility_etp_bucket5) ONLY. This is a deliberate, hand-audited override on
# top of the engine; it is intentionally simple and easy to change.
#
# Key   = "ETF/UNDERLYING" (exact pair, case-insensitive, e.g. "BITX/IBIT").
# Fields (all optional; omit for no change):
#   hedge_ratio_add : float  additive offset to the model hedge ratio h.
#                            Applied as h' = clip(h + hedge_ratio_add, h_min, h_max)
#                            then both short legs are re-solved from h'
#                            (inv = gross/(1+h'·β), und = (gross-inv)·phr).
#                            Only affects pairs sized by the opt2 engine (B4 core;
#                            B5 if opt2-sized). Positive = more underlying hedge.
#   gross_mult      : float  multiplicative scale on the pair's gross_target_usd
#                            (applied after sleeve sizing + caps — a deliberate
#                            operator tilt that can exceed the usual caps).
#                            1.0 = no change.
#   note            : str    free-text audit note; shown in proposed_trades.csv,
#                            the EOD B4 pair PDF title, and the summary CSV.
#
# Audit trail: every applied override writes pair_override_gross_mult,
# pair_override_hedge_add, pair_override_note (plus *_pre_override) columns into
# proposed_trades.csv, and is annotated on the EOD pair charts.
#
# Example:
#   BITX/IBIT:
#     hedge_ratio_add: 0.05
#     gross_mult: 1.15
#     note: "operator tilt: larger, slightly more hedged"
#
# TEMPLATE below: every pair that currently qualifies for Bucket 4 / Bucket 5 is
# pre-listed with no-op defaults (hedge_ratio_add: 0.0, gross_mult: 1.0). Entries left
# at these defaults are ignored by the engine (no tilt, no log) — edit a value to apply
# a tilt. Refresh this list with the qualifying set whenever the universe changes
# (snapshot date: 2026-06-24). Low-N (short-history) names are admitted via the
# strategy_config ``low_n_inclusion`` fallback and are ALSO auto-scaled by
# ``low_n_inclusion.size_mult`` — gross_mult here stacks multiplicatively on that.

pair_overrides:
  # ---- Bucket 4 (inverse_decay_bucket4) — core inverse ----
  SMZ/SMR:    { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  LITZ/LITE:  { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  QBTZ/QBTS:  { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  NBIZ/NBIS:  { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  CORD/CRWV:  { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  SNDQ/SNDK:  { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  MSTZ/MSTR:  { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  DAMD/AMD:   { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  CONI/COIN:  { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  # ---- Bucket 4 — low-N (short-history) inverse names ----
  SPCG/SPCX:  { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  SSPC/SPCX:  { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  SNK/SPCX:   { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  MUZ/MU:     { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  CBRZ/CBRS:  { hedge_ratio_add: 0.0, gross_mult: 1.0 }
  # ---- Bucket 5 (volatility_etp_bucket5) ----
  UVIX/SVIX:  { hedge_ratio_add: 0.0, gross_mult: 1.0 }
