name: Levered ETF Universe Discovery

on:
  schedule:
    # Weekdays after the U.S. close so first-day listings have a chance to print data.
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    inputs:
      allow_issuer_only:
        description: "Allow candidates without an exchange-source match"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_market_data:
        description: "Skip live yfinance trading verification"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      allow_pending_market_data:
        description: "Allow same-day listings with issuer/exchange proof but no yfinance bars yet"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      allow_future_listings:
        description: "Allow future-dated official listings"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout ls-algo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          path: ls-algo
          ref: main

      - name: Checkout Diamond-Creek-Quant
        uses: actions/checkout@v4
        with:
          repository: GoldmanDrew/Diamond-Creek-Quant
          token: ${{ secrets.GH_PAT || github.token }}
          path: Diamond-Creek-Quant
          ref: master

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ls-algo/requirements.txt

      - name: Install dependencies
        working-directory: ls-algo
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discover and patch candidate pairs
        working-directory: ls-algo
        run: |
          FLAGS=""
          if [ "${{ inputs.allow_issuer_only || 'false' }}" = "true" ]; then
            FLAGS="$FLAGS --allow-issuer-only"
          fi
          if [ "${{ inputs.skip_market_data || 'false' }}" = "true" ]; then
            FLAGS="$FLAGS --skip-market-data"
          fi
          if [ "${{ inputs.allow_pending_market_data || 'false' }}" = "true" ]; then
            FLAGS="$FLAGS --allow-pending-market-data"
          fi
          if [ "${{ inputs.allow_future_listings || 'false' }}" = "true" ]; then
            FLAGS="$FLAGS --allow-future-listings"
          fi
          python scripts/discover_single_stock_etfs.py \
            --repo-root . \
            --mirror-repo-root ../Diamond-Creek-Quant \
            --output-dir "$RUNNER_TEMP/discovery" \
            --write-patches \
            $FLAGS
          cp "$RUNNER_TEMP/discovery/pr_body.md" "$RUNNER_TEMP/pr_body.md"
          cat "$RUNNER_TEMP/discovery/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload discovery report
        uses: actions/upload-artifact@v4
        with:
          name: levered-etf-discovery-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/discovery/candidates.json
            ${{ runner.temp }}/discovery/verified.json
            ${{ runner.temp }}/discovery/added_by_repo.json
            ${{ runner.temp }}/discovery/source_errors.json
            ${{ runner.temp }}/discovery/summary.json
            ${{ runner.temp }}/discovery/summary.md
            ${{ runner.temp }}/discovery/pr_body.md

      - name: Create ls-algo PR
        working-directory: ls-algo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          BRANCH: codex/universe-discovery-${{ github.run_id }}
        run: |
          if git diff --quiet -- daily_screener.py; then
            echo "No ls-algo universe changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add daily_screener.py
          git commit -m "screener: add discovered levered ETF pairs"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "screener: add discovered levered ETF pairs" \
            --body-file "$RUNNER_TEMP/pr_body.md"

      - name: Create Diamond-Creek-Quant PR
        working-directory: Diamond-Creek-Quant
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          BRANCH: codex/universe-discovery-${{ github.run_id }}
        run: |
          if git diff --quiet -- daily_screener.py; then
            echo "No Diamond-Creek-Quant universe changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add daily_screener.py
          git commit -m "screener: add discovered levered ETF pairs"
          git push origin "$BRANCH"
          gh pr create \
            --repo GoldmanDrew/Diamond-Creek-Quant \
            --base master \
            --head "GoldmanDrew:$BRANCH" \
            --title "screener: add discovered levered ETF pairs" \
            --body-file "$RUNNER_TEMP/pr_body.md"
