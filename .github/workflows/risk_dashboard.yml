name: "Manual: Dashboard Rebuild & Deploy"

# Manual rebuild/deploy only. Daily snapshot build + deploy runs in
# ``Daily: Screener + EOD + Dashboard`` (eod_pnl_email.yml).

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: "Run date YYYY-MM-DD (blank = latest accounting run)"
        required: false
        default: ""
      skip_build:
        description: "Skip rebuilding snapshot (deploy site only)"
        required: false
        default: "false"
        type: boolean
      allow_broker_nav:
        description: "Allow broker Flex NAV in verify gates (legacy/dev only)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: risk-dashboard-pages
  cancel-in-progress: false

jobs:
  resolve_date:
    runs-on: ubuntu-latest
    outputs:
      run_date: ${{ steps.date.outputs.run_date }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-repo-setup
        with:
          python-version: "3.11"
      - name: Resolve run date
        id: date
        run: |
          if [ -n "${{ inputs.run_date }}" ]; then
            RD="${{ inputs.run_date }}"
          else
            RD=$(python -c "
          from scripts.run_data_contract import discover_accounting_dates
          d = discover_accounting_dates()
          print(d[-1] if d else '')
          ")
          fi
          test -n "$RD"
          echo "run_date=$RD" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve_date
    if: inputs.skip_build != true
    uses: ./.github/workflows/_dashboard_build.yml
    with:
      run_date: ${{ needs.resolve_date.outputs.run_date }}
      allow_broker_nav: ${{ inputs.allow_broker_nav }}
      commit_snapshot: true
      run_tests: true
      commit_message: "risk_dashboard: manual snapshot ${{ needs.resolve_date.outputs.run_date }}"

  deploy:
    needs: [resolve_date, build]
    if: always() && (needs.build.result == 'success' || inputs.skip_build == true)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Pull latest
        run: git pull --no-rebase origin main

      - name: Verify latest.json before deploy
        run: |
          test -f risk_dashboard/data/latest.json
          python -c "
          import json, sys
          from pathlib import Path
          runs = Path('data/runs')
          dates = sorted(
              p.parent.parent.name
              for p in runs.glob('*/accounting/totals.json')
              if p.is_file()
          )
          if not dates:
              print('Deploy blocked: no accounting runs found', file=sys.stderr)
              sys.exit(1)
          snap = json.load(open('risk_dashboard/data/latest.json', encoding='utf-8'))
          latest = dates[-1]
          rd = snap.get('run_date')
          fresh = (snap.get('freshness') or {}).get('is_latest')
          if rd != latest or fresh is False:
              print(f'Deploy blocked: snapshot run_date={rd} latest={latest} fresh={fresh}', file=sys.stderr)
              sys.exit(1)
          print(f'Deploy ok: run_date={rd}')
          "

      - uses: actions/configure-pages@v5

      - name: Bundle snapshot for Pages
        run: |
          mkdir -p site/data
          cp risk_dashboard/data/latest.json site/data/latest.json
          cp risk_dashboard/data/index.json site/data/index.json 2>/dev/null || true

      - name: Inject build metadata
        run: |
          cat > site/build_meta.json <<EOF
          {
            "deployed_at_utc": "$(date -u +%FT%TZ)",
            "commit_sha": "${{ github.sha }}",
            "trigger": "${{ github.event_name }}",
            "snapshot_run_date": "$(python -c "import json; print(json.load(open('risk_dashboard/data/latest.json')).get('run_date',''))")"
          }
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: ./.github/actions/deploy-pages
        id: deployment
