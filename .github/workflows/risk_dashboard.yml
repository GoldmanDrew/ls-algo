name: Risk Dashboard

# Deploy the static site to GitHub Pages.
# Snapshot *build* runs as the tail of eod_pnl_email.yml (authoritative path).
# This workflow: deploy after snapshot commits, manual rebuild, or recovery.

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: "Run date YYYY-MM-DD (blank = latest accounting run)"
        required: false
        default: ""
      skip_build:
        description: "Skip rebuilding snapshot (deploy site only)"
        required: false
        default: "false"
        type: boolean
      allow_config_nav:
        description: "Allow config NAV fallback in verify gates (dev/backfill)"
        required: false
        default: "false"
        type: boolean

  push:
    branches: [main]
    paths:
      - "risk_dashboard/**"
      - "site/**"
      - "scripts/dashboard_pipeline.py"
      - "scripts/verify_dashboard_snapshot.py"
      - "scripts/run_data_contract.py"
      - ".github/workflows/risk_dashboard.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: risk-dashboard-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.skip_build != 'true')
      || (github.event_name == 'push'
        && !startsWith(github.event.head_commit.message, 'risk_dashboard: snapshot')
        && !startsWith(github.event.head_commit.message, 'risk_dashboard: recovery'))

    outputs:
      run_date: ${{ steps.date.outputs.run_date }}
      gates_passed: ${{ steps.gate.outputs.gates_passed }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/checkout@v4
        with:
          repository: GoldmanDrew/etf-dashboard
          ref: main
          path: etf-dashboard

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Resolve run date
        id: date
        run: |
          if [ -n "${{ inputs.run_date }}" ]; then
            RD="${{ inputs.run_date }}"
          else
            RD=$(python -c "
          from scripts.run_data_contract import discover_accounting_dates
          d = discover_accounting_dates()
          print(d[-1] if d else '')
          ")
          fi
          test -n "$RD"
          echo "run_date=$RD" >> "$GITHUB_OUTPUT"

      - name: Build + verify snapshot
        id: gate
        env:
          ALLOW_CONFIG: ${{ inputs.allow_config_nav }}
        run: |
          EXTRA=""
          if [ "$ALLOW_CONFIG" = "true" ]; then
            EXTRA="--allow-config-nav"
          fi
          python scripts/dashboard_pipeline.py \
            --run-date "${{ steps.date.outputs.run_date }}" \
            --write-manifest \
            --fail-if-stale \
            $EXTRA
          echo "gates_passed=true" >> "$GITHUB_OUTPUT"

      - name: Run dashboard tests
        run: |
          python -m pytest risk_dashboard/tests tests/test_dashboard_accounting_parity.py tests/test_dashboard_phase0_4.py -q

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add risk_dashboard/data data/runs/*/manifest.json || true
          if git diff --cached --quiet; then
            echo "No snapshot changes"
          else
            git commit -m "risk_dashboard: snapshot ${{ steps.date.outputs.run_date }}"
            git pull --no-rebase -X ours origin main || true
            git push
          fi

  deploy:
    needs: build
    if: |
      always() && (
        (needs.build.result == 'success' && needs.build.outputs.gates_passed == 'true')
        || (needs.build.result == 'skipped' && github.event_name == 'push')
        || (github.event_name == 'workflow_dispatch' && inputs.skip_build == 'true')
      )
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify latest.json before deploy
        run: |
          test -f risk_dashboard/data/latest.json
          python -c "
          import json, sys
          from scripts.run_data_contract import discover_accounting_dates
          snap = json.load(open('risk_dashboard/data/latest.json'))
          latest = discover_accounting_dates()[-1]
          rd = snap.get('run_date')
          fresh = (snap.get('freshness') or {}).get('is_latest')
          if rd != latest or fresh is False:
              print(f'Deploy blocked: snapshot run_date={rd} latest={latest} fresh={fresh}', file=sys.stderr)
              sys.exit(1)
          print(f'Deploy ok: run_date={rd}')
          "

      - uses: actions/configure-pages@v4

      - name: Bundle snapshot for Pages
        run: |
          mkdir -p site/data
          cp risk_dashboard/data/latest.json site/data/latest.json
          cp risk_dashboard/data/index.json site/data/index.json 2>/dev/null || true

      - name: Inject build metadata
        run: |
          cat > site/build_meta.json <<EOF
          {
            "deployed_at_utc": "$(date -u +%FT%TZ)",
            "commit_sha": "${{ github.sha }}",
            "trigger": "${{ github.event_name }}",
            "snapshot_run_date": "$(python -c "import json; print(json.load(open('risk_dashboard/data/latest.json')).get('run_date',''))")"
          }
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment
