name: "Daily: Screener + EOD + Dashboard"

concurrency:
  group: data-plane-main
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

on:
  schedule:
    # 06:00 UTC ≈ 02:00 America/New_York (Mon–Sat; holidays skipped in calendar job)
    - cron: "0 6 * * 1-6"
    # 10:00 UTC catch-up if snapshot/manifest is stale after morning EOD
    - cron: "0 10 * * 1-6"
  push:
    branches: [main]
    paths-ignore:
      - "site/**"
      - "risk_dashboard/data/**"
      - "**.md"
      - ".github/workflows/risk_dashboard.yml"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - screener
          - eod
          - recover

jobs:
  calendar:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.cal.outputs.should_run }}
      run_date: ${{ steps.cal.outputs.run_date }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-repo-setup
        with:
          python-version: "3.11"
      - name: Trading calendar gate
        id: cal
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            RUN_DATE=$(python -c "
          from datetime import datetime
          from zoneinfo import ZoneInfo
          print(datetime.now(ZoneInfo('America/New_York')).date().isoformat())
          ")
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "run_date=$RUN_DATE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python -c "
          from scripts.trading_calendar import scheduled_run_context
          ctx = scheduled_run_context()
          print('should_run=' + str(ctx['should_run']).lower())
          print('run_date=' + ctx['run_date'])
          " >> "$GITHUB_OUTPUT"

  screener:
    needs: calendar
    if: >-
      needs.calendar.outputs.should_run == 'true'
      && github.event.schedule != '0 10 * * 1-6'
      && (
        (github.event_name == 'push'
          && github.event.head_commit != null
          && !startsWith(github.event.head_commit.message, 'screener:')
          && !startsWith(github.event.head_commit.message, 'eod:')
          && !startsWith(github.event.head_commit.message, 'risk_dashboard:')
          && !contains(github.event.head_commit.message, 'Merge branch'))
        || (github.event_name == 'workflow_dispatch' && (inputs.job == 'screener' || inputs.job == 'both'))
        || (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1-6')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: ./.github/actions/python-repo-setup
        with:
          python-version: "3.11"

      - name: Fetch borrow history (etf-dashboard)
        run: |
          mkdir -p data
          curl -fsSL --connect-timeout 15 --max-time 120 \
            -o data/borrow_history.json \
            "https://raw.githubusercontent.com/GoldmanDrew/etf-dashboard/main/data/borrow_history.json" \
            || rm -f data/borrow_history.json

      - name: Run daily screener
        env:
          RUN_DATE: ${{ needs.calendar.outputs.run_date }}
        run: |
          echo "RUN_DATE=$RUN_DATE"
          python daily_screener.py --run-date "$RUN_DATE" --skip-ibkr-check
          python generate_trade_plan.py --run-date "$RUN_DATE"
          mkdir -p "data/runs/${RUN_DATE}"
          cp data/etf_screened_today.csv "data/runs/${RUN_DATE}/etf_screened_today.csv"

      - name: Commit screener outputs
        env:
          RUN_DATE: ${{ needs.calendar.outputs.run_date }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/proposed_trades.csv || true
          git add "data/runs/${RUN_DATE}/proposed_trades.csv" || true
          git add data/etf_screened_today.csv || true
          git add "data/runs/${RUN_DATE}/etf_screened_today.csv" || true
          if git diff --cached --quiet; then
            echo "No screener changes"
          else
            git commit -m "screener: $(date -u +%Y-%m-%d) refresh + trade plan"
            git pull --no-rebase -X ours origin main || true
            git push
          fi

  eod:
    needs: [calendar, screener]
    if: >-
      always()
      && needs.calendar.outputs.should_run == 'true'
      && github.event.schedule != '0 10 * * 1-6'
      && (needs.screener.result == 'success' || needs.screener.result == 'skipped')
      && (
        (github.event_name == 'workflow_dispatch' && (inputs.job == 'eod' || inputs.job == 'both'))
        || (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1-6')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 150
    outputs:
      run_date: ${{ needs.calendar.outputs.run_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: GoldmanDrew/etf-dashboard
          ref: main
          path: etf-dashboard

      - uses: ./.github/actions/python-repo-setup
        with:
          python-version: "3.11"
          install-pytest: "true"

      - name: Run EOD pipeline + email
        env:
          RUN_DATE: ${{ needs.calendar.outputs.run_date }}
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_Q_TRADES: ${{ secrets.IBKR_FLEX_Q_TRADES }}
          IBKR_FLEX_Q_CASH: ${{ secrets.IBKR_FLEX_Q_CASH }}
          IBKR_FLEX_Q_POSITIONS: ${{ secrets.IBKR_FLEX_Q_POSITIONS }}
          IBKR_FLEX_Q_BORROW_DETAILS: ${{ secrets.IBKR_FLEX_Q_BORROW_DETAILS }}
          IBKR_FLEX_TRADES_TIMEOUT_SEC: "3600"
          IBKR_FLEX_1019_STUCK_MAX_RENEWS: "0"
          PNL_RECIPIENTS: ${{ secrets.PNL_RECIPIENTS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || 587 }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          python ibkr_flex.py --run-date "$RUN_DATE"
          python scripts/ibkr_accounting_pnl.py "$RUN_DATE"
          python -m scripts.b4_reconstruct_state --run-date "$RUN_DATE"
          EOD_SKIP_PIPELINE=1 python run_eod_pnl_email.py
          python scripts/run_data_contract.py --run-date "$RUN_DATE"

      - name: Build + verify risk dashboard snapshot
        env:
          RUN_DATE: ${{ needs.calendar.outputs.run_date }}
        run: |
          python scripts/dashboard_pipeline.py \
            --run-date "$RUN_DATE" \
            --write-manifest \
            --fail-if-stale

      - name: Run dashboard tests
        run: |
          python -m pytest risk_dashboard/tests tests/test_dashboard_accounting_parity.py tests/test_dashboard_phase0_4.py -q

      - name: Commit EOD + dashboard outputs
        env:
          RUN_DATE: ${{ needs.calendar.outputs.run_date }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ risk_dashboard/data "data/runs/${RUN_DATE}/manifest.json" || true
          if git diff --cached --quiet; then
            echo "No EOD or dashboard changes"
          else
            git commit -m "eod: $(date -u +%Y-%m-%d) pnl + risk dashboard snapshot"
            git pull --no-rebase -X ours origin main || true
            git push
          fi

  deploy:
    needs: [calendar, eod]
    if: needs.eod.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: risk-dashboard-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest snapshot commit
        run: git pull --no-rebase origin main

      - name: Verify latest.json before deploy
        run: |
          test -f risk_dashboard/data/latest.json
          python -c "
          import json, sys
          from pathlib import Path
          runs = Path('data/runs')
          dates = sorted(
              p.parent.parent.name
              for p in runs.glob('*/accounting/totals.json')
              if p.is_file()
          )
          if not dates:
              print('Deploy blocked: no accounting runs found', file=sys.stderr)
              sys.exit(1)
          snap = json.load(open('risk_dashboard/data/latest.json', encoding='utf-8'))
          latest = dates[-1]
          rd = snap.get('run_date')
          fresh = (snap.get('freshness') or {}).get('is_latest')
          if rd != latest or fresh is False:
              print(f'Deploy blocked: snapshot run_date={rd} latest={latest} fresh={fresh}', file=sys.stderr)
              sys.exit(1)
          print(f'Deploy ok: run_date={rd}')
          "

      - uses: actions/configure-pages@v5

      - name: Bundle snapshot for Pages
        run: |
          mkdir -p site/data
          cp risk_dashboard/data/latest.json site/data/latest.json
          cp risk_dashboard/data/index.json site/data/index.json 2>/dev/null || true

      - name: Inject build metadata
        run: |
          cat > site/build_meta.json <<EOF
          {
            "deployed_at_utc": "$(date -u +%FT%TZ)",
            "commit_sha": "${{ github.sha }}",
            "trigger": "${{ github.event_name }}",
            "snapshot_run_date": "$(python -c "import json; print(json.load(open('risk_dashboard/data/latest.json')).get('run_date',''))")"
          }
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: ./.github/actions/deploy-pages
        id: deployment

  recover:
    needs: [calendar, deploy]
    if: >-
      always()
      && needs.calendar.outputs.should_run == 'true'
      && (
        needs.deploy.result == 'success'
        || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * 1-6')
        || (github.event_name == 'workflow_dispatch' && inputs.job == 'recover')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/checkout@v4
        with:
          repository: GoldmanDrew/etf-dashboard
          ref: main
          path: etf-dashboard

      - uses: ./.github/actions/python-repo-setup
        with:
          python-version: "3.11"
          install-pytest: "true"

      - name: Recovery check + rebuild if needed
        run: |
          RUN_DATE="${{ needs.calendar.outputs.run_date }}"
          if [ -z "$RUN_DATE" ]; then
            RUN_DATE=$(python -c "
          from scripts.run_data_contract import discover_accounting_dates
          d = discover_accounting_dates()
          print(d[-1] if d else '')
          ")
          fi
          if [ -z "$RUN_DATE" ]; then
            echo "No accounting runs; nothing to recover."
            exit 0
          fi
          echo "Recovery target run_date=$RUN_DATE"
          NEED=0
          if [ ! -f "data/runs/${RUN_DATE}/manifest.json" ]; then
            echo "missing manifest"
            NEED=1
          fi
          SNAP_DATE=$(python -c "import json; print(json.load(open('risk_dashboard/data/latest.json')).get('run_date',''))" 2>/dev/null || echo "")
          if [ "$SNAP_DATE" != "$RUN_DATE" ]; then
            echo "latest.json run_date=$SNAP_DATE expected $RUN_DATE"
            NEED=1
          fi
          if [ "$NEED" -eq 0 ]; then
            echo "Dashboard already current for $RUN_DATE"
            exit 0
          fi
          python scripts/dashboard_pipeline.py \
            --run-date "$RUN_DATE" \
            --write-manifest \
            --fail-if-stale

      - name: Commit recovered snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add risk_dashboard/data data/runs/*/manifest.json data/runs/*/etf_screened_today.csv || true
          if git diff --cached --quiet; then
            echo "No recovery changes"
          else
            git commit -m "risk_dashboard: recovery snapshot [skip ci]"
            git pull --no-rebase -X ours origin main || true
            git push
          fi
