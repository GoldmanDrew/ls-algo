name: EOD PnL Email + Daily Screener

on:
  schedule:
    # 06:00 UTC ≈ 02:00 America/New_York during EDT; 01:00 during EST (GitHub cron is UTC-only)
    - cron: "0 6 * * 2-6"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - screener
          - eod

jobs:
  # ────────────────────────────────────────────────────────
  # Daily screener — runs on weekdays
  # ────────────────────────────────────────────────────────
  screener:
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'screener' || inputs.job == 'both'))
      || (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 2-6')
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch borrow history (etf-dashboard) for weighted net edge
        run: |
          mkdir -p data
          if curl -fsSL --connect-timeout 15 --max-time 120 \
            -o data/borrow_history.json \
            "https://raw.githubusercontent.com/GoldmanDrew/etf-dashboard/main/data/borrow_history.json"
          then
            echo "borrow_history.json: $(wc -c < data/borrow_history.json) bytes"
          else
            echo "Note: borrow_history fetch failed; screener uses point-in-time borrow for net edge"
            rm -f data/borrow_history.json
          fi

      - name: Run daily screener
        run: |
          RUN_DATE=$(python -c "
          from datetime import datetime
          import pytz
          print(datetime.now(pytz.timezone('America/New_York')).date().isoformat())
          ")
          echo "RUN_DATE=$RUN_DATE"
          echo "RUN_DATE=$RUN_DATE" >> "$GITHUB_ENV"
          python daily_screener.py --run-date "$RUN_DATE" --skip-ibkr-check
          python generate_trade_plan.py --run-date "$RUN_DATE"

      - name: Commit screener + trade-plan outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/proposed_trades.csv || true
          git add "data/runs/${RUN_DATE}/proposed_trades.csv" || true
          git add data/etf_screened_today.csv || true
          if git diff --cached --quiet; then
            echo "No screener/trade-plan changes to commit"
          else
            git commit -m "screener: $(date -u +%Y-%m-%d) refresh + trade plan"
            git pull --no-rebase -X ours origin main || true
            git push
          fi

  # ────────────────────────────────────────────────────────
  # EOD PnL email — runs on weekdays
  # ────────────────────────────────────────────────────────
  eod:
    needs: screener
    if: >-
      always() &&
      ((github.event_name == 'workflow_dispatch' && (inputs.job == 'eod' || inputs.job == 'both'))
      || (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 2-6'))
    runs-on: ubuntu-latest
    # Flex trades can return 1019 for 30–90+ minutes; ibkr_flex waits up to IBKR_FLEX_TRADES_TIMEOUT_SEC and may renew stuck refs.
    timeout-minutes: 120

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run EOD pipeline + email
        env:
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_Q_TRADES: ${{ secrets.IBKR_FLEX_Q_TRADES }}
          IBKR_FLEX_Q_CASH: ${{ secrets.IBKR_FLEX_Q_CASH }}
          IBKR_FLEX_Q_POSITIONS: ${{ secrets.IBKR_FLEX_Q_POSITIONS }}
          IBKR_FLEX_Q_BORROW_DETAILS: ${{ secrets.IBKR_FLEX_Q_BORROW_DETAILS }}
          # Match ibkr_flex.py default floor; keeps CI explicit if defaults change.
          IBKR_FLEX_TRADES_TIMEOUT_SEC: "5400"

          # Email
          PNL_RECIPIENTS: ${{ secrets.PNL_RECIPIENTS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || 587 }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

        run: |
          RUN_DATE=$(python -c "
          from datetime import datetime
          import pytz
          print(datetime.now(pytz.timezone('America/New_York')).date().isoformat())
          ")
          export RUN_DATE

          # 1) Pull Flex
          python ibkr_flex.py --run-date "$RUN_DATE"

          # 2) Build accounting
          python ibkr_accounting.py "$RUN_DATE"

          # 3) Email
          python run_eod_pnl_email.py

      - name: Commit PnL outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          if git diff --cached --quiet; then
            echo "No PnL changes to commit"
          else
            git commit -m "eod: $(date -u +%Y-%m-%d) pnl history update"
            git pull --no-rebase -X ours origin main || true
            git push
          fi