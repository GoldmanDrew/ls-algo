name: EOD PnL Email + Daily Screener

on:
  schedule:
    # 15:00 UTC = 8am EST (winter) / 9am EDT (summer) — daily screener and pnl
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - screener
          - eod

jobs:
  # ────────────────────────────────────────────────────────
  # Daily screener — runs at 8am EST on weekdays
  # ────────────────────────────────────────────────────────
  screener:
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'screener' || inputs.job == 'both'))
      || (github.event_name == 'schedule' && github.event.schedule == '0 13 * * 1-5')
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily screener
        env:
          IBKR_FTP_USER: ${{ secrets.IBKR_FTP_USER }}
          IBKR_FTP_PASS: ${{ secrets.IBKR_FTP_PASS }}
        run: |
          RUN_DATE=$(python -c "
          from datetime import datetime
          import pytz
          print(datetime.now(pytz.timezone('America/New_York')).date().isoformat())
          ")
          echo "RUN_DATE=$RUN_DATE"
          python daily_screener.py --run-date "$RUN_DATE"

      - name: Commit screener outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_screened_today.csv data/runs/ || true
          git add data/scrape_cache_*.csv || true
          if git diff --cached --quiet; then
            echo "No screener changes to commit"
          else
            git commit -m "screener: $(date -u +%Y-%m-%d) run"
            git pull --rebase origin main
            git push
          fi

  # ────────────────────────────────────────────────────────
  # EOD PnL email — runs at 8pm EST on weekdays
  # ────────────────────────────────────────────────────────
  eod:
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'eod' || inputs.job == 'both'))
      || (github.event_name == 'schedule' && github.event.schedule == '0 13 * * 1-5')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run EOD pipeline + email
        env:
          # IBKR Flex
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_Q_TRADES: ${{ secrets.IBKR_FLEX_Q_TRADES }}
          IBKR_FLEX_Q_CASH: ${{ secrets.IBKR_FLEX_Q_CASH }}
          IBKR_FLEX_Q_POSITIONS: ${{ secrets.IBKR_FLEX_Q_POSITIONS }}

          # Email
          PNL_RECIPIENTS: ${{ secrets.PNL_RECIPIENTS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || 587 }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

        run: |
          RUN_DATE=$(python -c "
          from datetime import datetime
          import pytz
          print(datetime.now(pytz.timezone('America/New_York')).date().isoformat())
          ")
          export RUN_DATE

          # 1) Pull Flex
          python ibkr_flex.py --run-date "$RUN_DATE"

          # 2) Build accounting
          python ibkr_accounting.py "$RUN_DATE"

          # 3) Email
          python run_eod_pnl_email.py

      - name: Commit PnL history + plot back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ledger/pnl_history.csv data/ledger/*.png || true
          git add data/runs/ || true
          if git diff --cached --quiet; then
            echo "No PnL changes to commit"
          else
            git commit -m "eod: $(date -u +%Y-%m-%d) pnl history update"
            git pull --rebase origin main
            git push
          fi