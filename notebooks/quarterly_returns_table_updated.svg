<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440">
  <rect width="100%" height="100%" fill="#ffffff" />

  <style>
    .hdr { font-family: Garamond, "Times New Roman", serif; font-size: 46px; font-weight: 700; fill: #111111; }
    .cell { font-family: Garamond, "Times New Roman", serif; font-size: 42px; font-weight: 400; fill: #111111; }
    .rule { stroke: #111111; stroke-width: 2.2; }
  </style>

  <!-- Column centers -->
  <!-- Year=120, Q1=320, Q2=500, Q3=680, Q4=860, FY/YTD=1070 -->

  <!-- Header -->
  <text class="hdr" x="120" y="70" text-anchor="middle">Year</text>
  <text class="hdr" x="320" y="70" text-anchor="middle">Q1</text>
  <text class="hdr" x="500" y="70" text-anchor="middle">Q2</text>
  <text class="hdr" x="680" y="70" text-anchor="middle">Q3</text>
  <text class="hdr" x="860" y="70" text-anchor="middle">Q4</text>
  <text class="hdr" x="1070" y="70" text-anchor="middle">FY / YTD</text>

  <!-- Horizontal rules -->
  <line class="rule" x1="30" y1="105" x2="1170" y2="105" />
  <line class="rule" x1="30" y1="175" x2="1170" y2="175" />
  <line class="rule" x1="30" y1="245" x2="1170" y2="245" />
  <line class="rule" x1="30" y1="315" x2="1170" y2="315" />
  <line class="rule" x1="30" y1="385" x2="1170" y2="385" />

  <!-- 2023 -->
  <text class="cell" x="120" y="155" text-anchor="middle">2023</text>
  <text class="cell" x="320" y="155" text-anchor="middle">21.9%</text>
  <text class="cell" x="500" y="155" text-anchor="middle">10.4%</text>
  <text class="cell" x="680" y="155" text-anchor="middle">1.4%</text>
  <text class="cell" x="860" y="155" text-anchor="middle">11.5%</text>
  <text class="cell" x="1070" y="155" text-anchor="middle">52.3%</text>

  <!-- 2024 -->
  <text class="cell" x="120" y="225" text-anchor="middle">2024</text>
  <text class="cell" x="320" y="225" text-anchor="middle">3.5%</text>
  <text class="cell" x="500" y="225" text-anchor="middle">1.8%</text>
  <text class="cell" x="680" y="225" text-anchor="middle">(0.1%)</text>
  <text class="cell" x="860" y="225" text-anchor="middle">5.3%</text>
  <text class="cell" x="1070" y="225" text-anchor="middle">10.8%</text>

  <!-- 2025 -->
  <text class="cell" x="120" y="295" text-anchor="middle">2025</text>
  <text class="cell" x="320" y="295" text-anchor="middle">8.9%</text>
  <text class="cell" x="500" y="295" text-anchor="middle">5.1%</text>
  <text class="cell" x="680" y="295" text-anchor="middle">1.0%</text>
  <text class="cell" x="860" y="295" text-anchor="middle">3.4%</text>
  <text class="cell" x="1070" y="295" text-anchor="middle">19.5%</text>

  <!-- 2026 -->
  <text class="cell" x="120" y="365" text-anchor="middle">2026</text>
  <text class="cell" x="320" y="365" text-anchor="middle">14.2%</text>
  <text class="cell" x="500" y="365" text-anchor="middle"></text>
  <text class="cell" x="680" y="365" text-anchor="middle"></text>
  <text class="cell" x="860" y="365" text-anchor="middle"></text>
  <text class="cell" x="1070" y="365" text-anchor="middle">14.2%</text>
</svg>
